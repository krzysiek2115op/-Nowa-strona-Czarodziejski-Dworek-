<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 126" role="img" aria-label="Czarodziejski Dworek">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4E1A6"/>
      <stop offset=".30" stop-color="#DAB35F"/>
      <stop offset=".52" stop-color="#C49A4A"/>
      <stop offset=".78" stop-color="#A77E37"/>
      <stop offset="1" stop-color="#866227"/>
    </linearGradient>
  </defs>

  <!-- iskry -->
  <g fill="#C49A4A">
    <circle cx="40" cy="24" r="1.5" opacity=".75"/>
    <circle cx="128" cy="24" r="1.5" opacity=".75"/>
    <circle cx="22" cy="40" r="1.1" opacity=".6"/>
    <circle cx="146" cy="40" r="1.1" opacity=".6"/>
  </g>

  <g stroke="#5E2D40" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round">
    <!-- skrzydło lewe -->
    <path d="M22,94 L22,60 C22,52 28,49 40,49 C52,49 58,52 58,60 L58,94 Z" fill="url(#metal)"/>
    <!-- skrzydło prawe -->
    <path d="M110,94 L110,60 C110,52 116,49 128,49 C140,49 146,52 146,60 L146,94 Z" fill="url(#metal)"/>
    <!-- korpus centralny + barokowy szczyt -->
    <path d="M58,94 L58,52 C58,46 60,44 64,44 C68,44 69,40 70,37 C72,31 76,29 84,29 C92,29 96,31 98,37 C99,40 100,44 104,44 C108,44 110,46 110,52 L110,94 Z" fill="url(#metal)"/>

    <!-- gzymsy (cienka linia pod szczytem / nad skrzydłami) -->
    <line x1="56" y1="52" x2="112" y2="52" stroke-width="1.4"/>
    <line x1="20" y1="60" x2="58" y2="60"/>
    <line x1="110" y1="60" x2="148" y2="60"/>

    <!-- pilastry przy wejściu -->
    <g fill="#EAD08A" stroke-width=".9">
      <rect x="62.5" y="54.5" width="4" height="37"/>
      <rect x="61" y="53" width="7" height="2.4"/>
      <rect x="61" y="89.5" width="7" height="2.4"/>
      <rect x="101.5" y="54.5" width="4" height="37"/>
      <rect x="100" y="53" width="7" height="2.4"/>
      <rect x="100" y="89.5" width="7" height="2.4"/>
    </g>

    <!-- okna w szczycie (łukowe, ze szprosem) -->
    <path d="M75,46 L75,37 C75,34.5 76.8,33 79,33 C81.2,33 83,34.5 83,37 L83,46 Z" fill="#FBF6EE"/>
    <line x1="79" y1="33.5" x2="79" y2="46"/>
    <path d="M85,46 L85,37 C85,34.5 86.8,33 89,33 C91.2,33 93,34.5 93,37 L93,46 Z" fill="#FBF6EE"/>
    <line x1="89" y1="33.5" x2="89" y2="46"/>

    <!-- okno lewego skrzydła -->
    <path d="M35,82 L35,69 C35,65.5 37.4,63 40,63 C42.6,63 45,65.5 45,69 L45,82 Z" fill="#FBF6EE"/>
    <line x1="40" y1="63.5" x2="40" y2="82"/><line x1="35" y1="72" x2="45" y2="72"/>
    <!-- okno prawego skrzydła -->
    <path d="M123,82 L123,69 C123,65.5 125.4,63 128,63 C130.6,63 133,65.5 133,69 L133,82 Z" fill="#FBF6EE"/>
    <line x1="128" y1="63.5" x2="128" y2="82"/><line x1="123" y1="72" x2="133" y2="72"/>

    <!-- łukowe wrota ze zwornikiem -->
    <path d="M73,92 L73,68 C73,62 78,57.5 84,57.5 C90,57.5 95,62 95,68 L95,92 Z" fill="#5E2D40"/>
    <path d="M73,68 C73,62 78,57.5 84,57.5 C90,57.5 95,62 95,68" fill="none" stroke="#C49A4A" stroke-width="1.3"/>
    <line x1="84" y1="58" x2="84" y2="92" stroke="#C49A4A" stroke-width="1.1"/>
    <path d="M81,59 L87,59 L86,54 L82,54 Z" fill="#C49A4A" stroke="none"/>
    <circle cx="80" cy="76" r="1.2" fill="#C49A4A" stroke="none"/>
    <circle cx="88" cy="76" r="1.2" fill="#C49A4A" stroke="none"/>
  </g>

  <!-- sterczyna z chorągiewką-iskrą -->
  <line x1="84" y1="29" x2="84" y2="18" stroke="#5E2D40" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M84,9 l1.5,4.4 4.4,1.5 -4.4,1.5 -1.5,4.4 -1.5,-4.4 -4.4,-1.5 4.4,-1.5z" fill="#C49A4A"/>

  <!-- balustrada / cokół (lekko wygięty) -->
  <g stroke="#5E2D40" stroke-linecap="round">
    <path d="M14,95 Q84,101 154,95" fill="none" stroke-width="1.4"/>
    <path d="M12,103 Q84,110 156,103" fill="none" stroke-width="2.8"/>
    <g stroke-width="1.5">
      <line x1="26" y1="96.4" x2="26" y2="101.4"/><line x1="38" y1="97.1" x2="38" y2="102.1"/>
      <line x1="50" y1="97.7" x2="50" y2="102.7"/><line x1="62" y1="98.1" x2="62" y2="103.1"/>
      <line x1="74" y1="98.4" x2="74" y2="103.4"/><line x1="84" y1="98.5" x2="84" y2="103.5"/>
      <line x1="94" y1="98.4" x2="94" y2="103.4"/><line x1="106" y1="98.1" x2="106" y2="103.1"/>
      <line x1="118" y1="97.7" x2="118" y2="102.7"/><line x1="130" y1="97.1" x2="130" y2="102.1"/>
      <line x1="142" y1="96.4" x2="142" y2="101.4"/>
    </g>
  </g>
</svg>
